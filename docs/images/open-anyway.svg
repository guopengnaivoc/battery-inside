<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="1040" viewBox="0 0 1400 1040" role="img" aria-labelledby="title desc">
  <title id="title">安全打开未签名的 BatteryInside</title>
  <desc id="desc">从应用程序打开 BatteryInside，关闭无法验证开发者的提示但不要移到废纸篓，然后在隐私与安全性中点击仍要打开，最后确认打开。</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-25%" width="140%" height="160%"><feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="#182032" flood-opacity=".12"/></filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="10" markerHeight="10" orient="auto-start-reverse"><path d="M1 1l10 5-10 5z" fill="#1677ff"/></marker>
    <g id="appIcon">
      <rect width="82" height="82" rx="20" fill="#050608"/>
      <rect x="13" y="30" width="50" height="26" rx="8" fill="#2fce64"/>
      <rect x="65" y="37" width="6" height="12" rx="3" fill="#2fce64"/>
      <path d="m42 34-10 13h8l-3 10 13-15h-8z" fill="#fff"/>
    </g>
  </defs>
  <rect width="1400" height="1040" rx="42" fill="#f2f3f6"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="700" y="56" text-anchor="middle" fill="#17191f" font-size="32" font-weight="760">安全打开未签名应用 · Open an unsigned app safely</text>
    <text x="700" y="88" text-anchor="middle" fill="#687183" font-size="18">仅适用于从本项目 GitHub Release 下载且 SHA-256 校验一致的文件</text>

    <g transform="translate(58 120)" filter="url(#shadow)">
      <rect width="620" height="380" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="21" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="760">1</text>
      <text x="80" y="49" fill="#1b1e25" font-size="24" font-weight="720">从“应用程序”打开</text>
      <rect x="32" y="79" width="556" height="252" rx="22" fill="#f6f7f9" stroke="#d8dbe2"/>
      <rect x="32" y="79" width="556" height="44" rx="22" fill="#e7e9ee"/><circle cx="57" cy="101" r="6" fill="#ff5f57"/><circle cx="77" cy="101" r="6" fill="#febc2e"/><circle cx="97" cy="101" r="6" fill="#28c840"/>
      <text x="310" y="108" text-anchor="middle" fill="#515867" font-size="16" font-weight="650">应用程序 · Applications</text>
      <g transform="translate(108 163)"><use href="#appIcon"/><text x="41" y="110" text-anchor="middle" fill="#343942" font-size="16">电池内显</text></g>
      <path d="M284 260C240 242 217 219 196 197" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
      <g transform="translate(300 209)"><path d="M0 0l20 72 16-24 27 31 15-13-28-30 26-10z" fill="#fff" stroke="#1d2129" stroke-width="4" stroke-linejoin="round"/><circle cx="8" cy="-5" r="8" fill="#1677ff"/><circle cx="24" cy="-1" r="8" fill="#1677ff"/></g>
      <text x="434" y="215" text-anchor="middle" fill="#1677ff" font-size="20" font-weight="720">双击 · Double-click</text>
      <text x="434" y="246" text-anchor="middle" fill="#6a7281" font-size="16">先尝试打开一次</text>
    </g>

    <g transform="translate(722 120)" filter="url(#shadow)">
      <rect width="620" height="380" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="21" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="760">2</text>
      <text x="80" y="49" fill="#1b1e25" font-size="24" font-weight="720">关闭提示，不要删除应用</text>
      <rect x="59" y="89" width="502" height="237" rx="24" fill="#f8f8fa" stroke="#cfd3dc"/>
      <g transform="translate(88 122) scale(.64)"><use href="#appIcon"/></g>
      <text x="181" y="141" fill="#20242c" font-size="20" font-weight="720">Apple 无法检查“电池内显”</text>
      <text x="181" y="169" fill="#5e6674" font-size="16">是否包含恶意软件</text>
      <text x="89" y="210" fill="#5e6674" font-size="15">这是未签名版本常见的 Gatekeeper 提示。</text>
      <rect x="90" y="246" width="175" height="45" rx="12" fill="#eceef2" stroke="#c7cbd4"/>
      <text x="177" y="274" text-anchor="middle" fill="#3d4450" font-size="16">移到废纸篓 · Trash</text>
      <path d="M104 235l147 68M251 235l-147 68" stroke="#ff3b30" stroke-width="7" stroke-linecap="round" opacity=".86"/>
      <rect x="355" y="238" width="150" height="60" rx="14" fill="#1677ff"/>
      <text x="430" y="266" text-anchor="middle" fill="#fff" font-size="17" font-weight="720">完成 · Done</text>
      <text x="430" y="286" text-anchor="middle" fill="#dcecff" font-size="12">点击这里</text>
      <path d="M528 188C531 211 500 226 475 240" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    </g>

    <g transform="translate(58 540)" filter="url(#shadow)">
      <rect width="620" height="380" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="21" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="760">3</text>
      <text x="80" y="49" fill="#1b1e25" font-size="24" font-weight="720">进入“隐私与安全性”</text>
      <rect x="30" y="78" width="560" height="262" rx="22" fill="#f5f6f8" stroke="#d8dbe2"/>
      <rect x="30" y="78" width="182" height="262" rx="22" fill="#e9ebef"/>
      <text x="55" y="119" fill="#555d6b" font-size="15">系统设置</text>
      <g transform="translate(48 143)"><rect width="146" height="42" rx="10" fill="#d4e7ff"/><path d="M18 13v17m-7-8h14" stroke="#1677ff" stroke-width="3" stroke-linecap="round"/><text x="39" y="27" fill="#1b4d86" font-size="15" font-weight="670">隐私与安全性</text></g>
      <text x="242" y="116" fill="#20242c" font-size="23" font-weight="730">隐私与安全性</text>
      <text x="242" y="163" fill="#5c6472" font-size="16">安全性</text>
      <text x="242" y="200" fill="#3f4652" font-size="15">“电池内显”已被阻止使用，</text>
      <text x="242" y="223" fill="#3f4652" font-size="15">因为其来自身份不明的开发者。</text>
      <rect x="397" y="248" width="155" height="54" rx="13" fill="#1677ff"/>
      <text x="474" y="271" text-anchor="middle" fill="#fff" font-size="16" font-weight="720">仍要打开</text>
      <text x="474" y="291" text-anchor="middle" fill="#dcecff" font-size="12">Open Anyway</text>
      <path d="M327 311C350 290 379 281 407 276" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
      <text x="307" y="330" text-anchor="middle" fill="#687183" font-size="14">首次尝试打开后约一小时内显示</text>
    </g>

    <g transform="translate(722 540)" filter="url(#shadow)">
      <rect width="620" height="380" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="21" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="760">4</text>
      <text x="80" y="49" fill="#1b1e25" font-size="24" font-weight="720">再次确认“打开”</text>
      <rect x="63" y="94" width="494" height="227" rx="24" fill="#f8f8fa" stroke="#cfd3dc"/>
      <g transform="translate(91 126) scale(.64)"><use href="#appIcon"/></g>
      <text x="181" y="143" fill="#20242c" font-size="20" font-weight="720">确定要打开“电池内显”吗？</text>
      <text x="91" y="197" fill="#5e6674" font-size="15">只有确认文件来自官方 GitHub Release</text>
      <text x="91" y="220" fill="#5e6674" font-size="15">且 SHA-256 一致时才继续。</text>
      <rect x="220" y="250" width="126" height="46" rx="12" fill="#eceef2" stroke="#c7cbd4"/><text x="283" y="279" text-anchor="middle" fill="#3d4450" font-size="16">取消</text>
      <rect x="371" y="242" width="130" height="61" rx="14" fill="#1677ff"/><text x="436" y="269" text-anchor="middle" fill="#fff" font-size="17" font-weight="720">打开</text><text x="436" y="290" text-anchor="middle" fill="#dcecff" font-size="12">Open</text>
      <path d="M526 187C533 218 503 238 478 250" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" marker-end="url(#arrow)"/>
    </g>

    <rect x="58" y="954" width="1284" height="58" rx="18" fill="#fff0ee" stroke="#ffb9b3"/>
    <circle cx="91" cy="983" r="16" fill="#ff3b30"/><text x="91" y="990" text-anchor="middle" fill="#fff" font-size="20" font-weight="800">!</text>
    <text x="120" y="989" fill="#74231d" font-size="17" font-weight="650">若系统明确提示“会损坏电脑”、检测到恶意软件或文件已损坏，请停止操作并重新下载，不要强行打开。</text>
  </g>
</svg>
