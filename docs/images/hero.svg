<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="440" viewBox="0 0 1200 440" role="img" aria-labelledby="title desc">
  <title id="title">BatteryInside menu bar preview</title>
  <desc id="desc">A macOS style menu bar showing a compact battery with the percentage inside.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#12151c"/><stop offset="1" stop-color="#050608"/></linearGradient>
    <filter id="shadow" x="-20%" y="-50%" width="140%" height="200%"><feDropShadow dx="0" dy="12" stdDeviation="18" flood-opacity=".45"/></filter>
  </defs>
  <rect width="1200" height="440" rx="42" fill="url(#bg)"/>
  <circle cx="1060" cy="86" r="120" fill="#37d568" opacity=".08"/>
  <circle cx="145" cy="380" r="180" fill="#ff9f0a" opacity=".05"/>
  <text x="72" y="116" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="52" font-weight="700">BatteryInside</text>
  <text x="74" y="161" fill="#aeb4c0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24">Percentage, power state and color — in one compact icon.</text>
  <g transform="translate(72 232)" filter="url(#shadow)">
    <rect width="1056" height="96" rx="28" fill="#242833" stroke="#3c4250"/>
    <circle cx="48" cy="48" r="8" fill="#ff5f57"/><circle cx="76" cy="48" r="8" fill="#febc2e"/><circle cx="104" cy="48" r="8" fill="#28c840"/>
    <text x="760" y="58" fill="#f4f4f6" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="24">Mon 09:41</text>
    <g transform="translate(930 27)">
      <rect x="0" y="0" width="86" height="42" rx="12" fill="none" stroke="#fff" stroke-width="3"/>
      <rect x="89" y="13" width="6" height="16" rx="3" fill="#fff"/>
      <rect x="3" y="3" width="64" height="36" rx="9" fill="#37d568"/>
      <text x="43" y="29" text-anchor="middle" fill="#060806" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20" font-weight="800">76</text>
    </g>
  </g>
  <text x="72" y="388" fill="#6f7684" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18">macOS 13+  ·  Apple silicon + Intel  ·  Local-only</text>
</svg>
