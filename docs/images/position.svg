<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Hold Command and drag BatteryInside to the right</title>
  <desc id="desc">Press and hold the Command key, drag the BatteryInside menu bar indicator to the right of other app icons, then release it. macOS remembers the position.</desc>
  <defs>
    <filter id="shadow" x="-20%" y="-30%" width="140%" height="170%"><feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#182032" flood-opacity=".13"/></filter>
    <g id="battery">
      <rect x="0" y="0" width="58" height="25" rx="7" fill="none" stroke="currentColor" stroke-width="3"/>
      <rect x="60" y="7" width="5" height="11" rx="2.5" fill="currentColor"/>
      <rect x="3.5" y="3.5" width="35" height="18" rx="4.5" fill="#fff"/>
      <text x="29" y="18" text-anchor="middle" fill="#11151c" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="12" font-weight="750">72</text>
    </g>
  </defs>
  <rect width="1200" height="520" rx="40" fill="#f2f3f6"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <text x="600" y="58" text-anchor="middle" fill="#17191f" font-size="30" font-weight="760">⌘ Command + drag</text>

    <g transform="translate(62 92)" filter="url(#shadow)">
      <rect width="310" height="352" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="20" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="750">1</text>
      <rect x="68" y="90" width="174" height="124" rx="22" fill="#e8eaf0" stroke="#c7cbd4" stroke-width="2"/>
      <rect x="81" y="103" width="148" height="98" rx="16" fill="#fff" stroke="#b8bdc8" stroke-width="2"/>
      <text x="155" y="151" text-anchor="middle" fill="#17191f" font-size="38" font-weight="650">⌘</text>
      <text x="155" y="181" text-anchor="middle" fill="#4f5766" font-size="18" font-weight="650">Command</text>
      <path d="M86 247h138" stroke="#d4d7de" stroke-width="2"/>
      <path d="M112 269v32m86-32v32" stroke="#687183" stroke-width="7" stroke-linecap="round"/>
      <path d="M102 291h106" stroke="#687183" stroke-width="7" stroke-linecap="round"/>
      <circle cx="112" cy="270" r="8" fill="#1677ff"/><circle cx="198" cy="270" r="8" fill="#1677ff"/>
      <text x="155" y="330" text-anchor="middle" fill="#697180" font-size="18">keep holding</text>
    </g>

    <g transform="translate(408 92)" filter="url(#shadow)">
      <rect width="730" height="352" rx="30" fill="#fff" stroke="#d8dbe2"/>
      <circle cx="42" cy="42" r="20" fill="#1677ff"/><text x="42" y="50" text-anchor="middle" fill="#fff" font-size="23" font-weight="750">2</text>
      <rect x="34" y="84" width="662" height="76" rx="17" fill="#20242c"/>
      <circle cx="66" cy="122" r="13" fill="#8b93a2"/><circle cx="103" cy="122" r="13" fill="#9d6cff"/><circle cx="140" cy="122" r="13" fill="#ff9f0a"/>
      <g transform="translate(190 109)" color="#fff" opacity=".38"><use href="#battery"/></g>
      <g transform="translate(568 109)" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round"><path d="M0 15c8-9 20-9 28 0M6 21c5-5 11-5 16 0"/><circle cx="14" cy="27" r="2" fill="#fff" stroke="none"/></g>
      <g transform="translate(614 110)" fill="none" stroke="#fff" stroke-width="3"><rect width="31" height="24" rx="6"/><path d="M8 29h15"/></g>
      <text x="670" y="131" text-anchor="middle" fill="#fff" font-size="19" font-weight="650">9:41</text>

      <path d="M243 190C335 249 412 243 516 178" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" stroke-dasharray="10 12"/>
      <path d="m500 176 24-2-10 22" fill="none" stroke="#1677ff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <g transform="translate(326 207)">
        <path d="M0 0 18 68l15-22 25 29 14-12-26-28 25-9z" fill="#fff" stroke="#20242c" stroke-width="4" stroke-linejoin="round"/>
        <circle cx="7" cy="-4" r="8" fill="#1677ff"/>
      </g>

      <rect x="470" y="92" width="89" height="60" rx="12" fill="none" stroke="#36d06d" stroke-width="4"/>
      <g transform="translate(482 109)" color="#fff"><use href="#battery"/></g>
      <circle cx="642" cy="293" r="25" fill="#34c759"/><path d="m630 293 8 9 17-20" fill="none" stroke="#fff" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="335" y="329" text-anchor="middle" fill="#697180" font-size="18">app icons</text>
      <path d="M307 305h-230" stroke="#b5bac5" stroke-width="2"/><path d="M363 305h196" stroke="#b5bac5" stroke-width="2"/>
    </g>
  </g>
</svg>
