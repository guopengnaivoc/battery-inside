<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">Exact BatteryInside color behavior</title>
  <desc id="desc">The entire interior fill changes from white to orange or red. The outline and battery cap do not take the warning color.</desc>
  <rect width="1200" height="430" rx="40" fill="#f3f4f6"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <text x="600" y="56" fill="#111827" font-size="29" font-weight="750">ONLY THE FULL INTERIOR CHANGES COLOR</text>
    <text x="600" y="84" fill="#667085" font-size="18">The outline and battery cap always follow the macOS label color.</text>
    <g transform="translate(46 112)"><rect width="250" height="246" rx="28" fill="#fff" stroke="#d7dae0"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="#fff" stroke="#111" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="56" y="39" fill="#000" font-size="25" font-weight="800">76</text></g><text x="125" y="169" fill="#111827" font-size="25" font-weight="700">≥ 30%</text><text x="125" y="203" fill="#667085" font-size="18">Full white interior</text></g>
    <g transform="translate(332 112)"><rect width="250" height="246" rx="28" fill="#fff" stroke="#d7dae0"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="#ff941a" stroke="#111" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="56" y="39" fill="#000" font-size="25" font-weight="800">24</text></g><text x="125" y="169" fill="#d86f00" font-size="25" font-weight="700">10–29%</text><text x="125" y="203" fill="#667085" font-size="18">Full orange interior</text></g>
    <g transform="translate(618 112)"><rect width="250" height="246" rx="28" fill="#fff" stroke="#d7dae0"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="#f22e24" stroke="#111" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#111" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><text x="56" y="39" fill="#000" font-size="25" font-weight="800">8</text></g><text x="125" y="169" fill="#d92d20" font-size="25" font-weight="700">≤ 9%</text><text x="125" y="203" fill="#667085" font-size="18">Full red interior</text></g>
    <g transform="translate(904 112)"><rect width="250" height="246" rx="28" fill="#fff" stroke="#d7dae0"/><g transform="translate(45 47)"><rect x="0" width="150" height="74" rx="19" fill="#fff" stroke="#111" stroke-width="5"/><path d="M155 24h10v26h-10" fill="none" stroke="#111" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><path d="M50 9 30 39h19l-6 27 31-36H54z" fill="#000"/><rect x="99" y="29" width="27" height="20" rx="5" fill="#000"/><path d="M104 30V18m17 12V18m-8 31v12" stroke="#000" stroke-width="5" stroke-linecap="round"/></g><text x="125" y="169" fill="#111827" font-size="24" font-weight="700">Bolt / Plug</text><text x="125" y="203" fill="#667085" font-size="18">Always black inside</text></g>
  </g>
  <text x="600" y="401" text-anchor="middle" fill="#475467" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18">The current app does not shorten the interior fill as the percentage drops.</text>
</svg>
