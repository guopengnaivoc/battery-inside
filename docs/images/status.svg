<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="410" viewBox="0 0 1200 410" role="img" aria-labelledby="title desc">
  <title id="title">Battery color and power states</title><desc id="desc">White above thirty percent, orange below thirty percent, red below ten percent, with lightning or plug symbols for power.</desc>
  <rect width="1200" height="410" rx="40" fill="#101218"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <text x="600" y="62" fill="#fff" font-size="30" font-weight="700">STATUS AT A GLANCE</text>
    <g transform="translate(80 112)"><rect width="220" height="210" rx="28" fill="#1d2029"/><g transform="translate(49 48)"><rect width="112" height="58" rx="15" fill="none" stroke="#fff" stroke-width="4"/><rect x="116" y="19" width="8" height="20" rx="4" fill="#fff"/><rect x="4" y="4" width="86" height="50" rx="11" fill="#fff"/><text x="56" y="39" fill="#111" font-size="25" font-weight="800">76</text></g><text x="110" y="155" fill="#fff" font-size="24" font-weight="650">≥ 30%</text><text x="110" y="185" fill="#9097a6" font-size="18">Normal</text></g>
    <g transform="translate(340 112)"><rect width="220" height="210" rx="28" fill="#1d2029"/><g transform="translate(49 48)"><rect width="112" height="58" rx="15" fill="none" stroke="#ff9f0a" stroke-width="4"/><rect x="116" y="19" width="8" height="20" rx="4" fill="#ff9f0a"/><rect x="4" y="4" width="38" height="50" rx="11" fill="#ff9f0a"/><text x="56" y="39" fill="#ff9f0a" font-size="25" font-weight="800">24</text></g><text x="110" y="155" fill="#ff9f0a" font-size="24" font-weight="650">10–29%</text><text x="110" y="185" fill="#9097a6" font-size="18">Low</text></g>
    <g transform="translate(600 112)"><rect width="220" height="210" rx="28" fill="#1d2029"/><g transform="translate(49 48)"><rect width="112" height="58" rx="15" fill="none" stroke="#ff453a" stroke-width="4"/><rect x="116" y="19" width="8" height="20" rx="4" fill="#ff453a"/><rect x="4" y="4" width="16" height="50" rx="8" fill="#ff453a"/><text x="56" y="39" fill="#ff453a" font-size="25" font-weight="800">8</text></g><text x="110" y="155" fill="#ff453a" font-size="24" font-weight="650">≤ 9%</text><text x="110" y="185" fill="#9097a6" font-size="18">Critical</text></g>
    <g transform="translate(860 112)"><rect width="260" height="210" rx="28" fill="#1d2029"/><g transform="translate(45 53)"><path d="M46 0 18 47h27l-8 43 38-55H49z" fill="#37d568"/><path d="M132 11v23m-15-14h30v45h-30V20zm7 45v18m16-18v18" fill="none" stroke="#aeb4c0" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/></g><text x="130" y="155" fill="#fff" font-size="24" font-weight="650">⚡ / Plug</text><text x="130" y="185" fill="#9097a6" font-size="18">Charging / Powered</text></g>
  </g>
</svg>
