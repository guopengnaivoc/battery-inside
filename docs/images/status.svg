<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="430" viewBox="0 0 1200 430" role="img" aria-labelledby="title desc">
  <title id="title">BatteryInside proportional fill behavior</title>
  <desc id="desc">The interior fill width tracks the percentage continuously while its color changes at thirty and ten percent.</desc>
  <rect width="1200" height="430" rx="40" fill="#101218"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" text-anchor="middle">
    <text x="600" y="56" fill="#fff" font-size="29" font-weight="750">FILL WIDTH TRACKS THE BATTERY PERCENTAGE</text>
    <text x="600" y="84" fill="#9aa2b1" font-size="18">Exact percentage comes from the number; the bar is a continuous visual estimate.</text>
    <g transform="translate(46 112)"><rect width="250" height="246" rx="28" fill="#1d2029" stroke="#353a45"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="none" stroke="#fff" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="79.04" height="50" rx="11" fill="#fff"/><text x="56" y="39" fill="#000" font-size="25" font-weight="800">76</text></g><text x="125" y="169" fill="#fff" font-size="25" font-weight="700">76%</text><text x="125" y="203" fill="#9aa2b1" font-size="18">76% white fill</text></g>
    <g transform="translate(332 112)"><rect width="250" height="246" rx="28" fill="#1d2029" stroke="#353a45"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="none" stroke="#fff" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="24.96" height="50" rx="11" fill="#ff941a"/><text x="56" y="39" fill="#fff" font-size="25" font-weight="800">24</text></g><text x="125" y="169" fill="#ff941a" font-size="25" font-weight="700">24%</text><text x="125" y="203" fill="#9aa2b1" font-size="18">24% orange fill</text></g>
    <g transform="translate(618 112)"><rect width="250" height="246" rx="28" fill="#1d2029" stroke="#353a45"/><g transform="translate(48 48) scale(1.25)"><rect x="0" width="112" height="58" rx="15" fill="none" stroke="#fff" stroke-width="4"/><path d="M116 19h8v20h-8" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="4" width="8.32" height="50" rx="4.16" fill="#f22e24"/><text x="56" y="39" fill="#fff" font-size="25" font-weight="800">8</text></g><text x="125" y="169" fill="#ff453a" font-size="25" font-weight="700">8%</text><text x="125" y="203" fill="#9aa2b1" font-size="18">8% red fill</text></g>
    <g transform="translate(904 112)"><rect width="250" height="246" rx="28" fill="#1d2029" stroke="#353a45"/><text x="125" y="72" fill="#fff" font-size="30" font-weight="750">20.8 pt</text><path d="M53 112h144" stroke="#fff" stroke-width="5" stroke-linecap="round"/><path d="m53 112 14-10v20zm144 0-14-10v20z" fill="#fff"/><text x="125" y="153" fill="#ffcc66" font-size="22" font-weight="700">÷ 100</text><text x="125" y="188" fill="#fff" font-size="24" font-weight="700">0.208 pt / 1%</text><text x="125" y="218" fill="#9aa2b1" font-size="17">Subpixel rendering</text></g>
  </g>
  <text x="600" y="402" text-anchor="middle" fill="#9aa2b1" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="18">Outline and battery cap follow macOS label color; the fill keeps a 1.6 pt inset from the body.</text>
</svg>
