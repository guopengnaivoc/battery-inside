<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="480" viewBox="0 0 1200 480" role="img" aria-labelledby="title desc">
  <title id="title">Open settings and hide the system battery icon</title><desc id="desc">Open BatteryInside again from Applications for settings, and optionally turn off the macOS battery menu bar item.</desc>
  <rect width="1200" height="480" rx="40" fill="#f2f3f6"/>
  <g font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">
    <g transform="translate(60 58)"><rect width="500" height="364" rx="32" fill="#fff" stroke="#d7d9df"/><text x="34" y="54" fill="#17191f" font-size="28" font-weight="700">Applications → BatteryInside</text><rect x="42" y="92" width="92" height="92" rx="24" fill="#050608"/><rect x="60" y="123" width="53" height="29" rx="8" fill="#37d568"/><rect x="115" y="132" width="6" height="11" rx="3" fill="#37d568"/><path d="M165 139h55" stroke="#8d94a2" stroke-width="8" stroke-linecap="round"/><path d="m208 121 22 18-22 18" fill="none" stroke="#8d94a2" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/><rect x="260" y="92" width="196" height="192" rx="22" fill="#f4f5f7"/><text x="280" y="130" fill="#191b21" font-size="20" font-weight="650">Settings</text><text x="280" y="173" fill="#555d6c" font-size="17">Launch at login</text><rect x="393" y="151" width="45" height="26" rx="13" fill="#34c759"/><circle cx="425" cy="164" r="10" fill="#fff"/><text x="280" y="218" fill="#555d6c" font-size="17">Low battery alerts</text><rect x="393" y="196" width="45" height="26" rx="13" fill="#34c759"/><circle cx="425" cy="209" r="10" fill="#fff"/><text x="250" y="326" text-anchor="middle" fill="#697180" font-size="19">Open the app again to change settings</text></g>
    <g transform="translate(640 58)"><rect width="500" height="364" rx="32" fill="#fff" stroke="#d7d9df"/><text x="34" y="54" fill="#17191f" font-size="28" font-weight="700">System Settings</text><rect x="38" y="86" width="424" height="190" rx="22" fill="#f4f5f7"/><circle cx="76" cy="127" r="19" fill="#7e8797"/><path d="M66 127h20m-10-10v20" stroke="#fff" stroke-width="4" stroke-linecap="round"/><text x="109" y="135" fill="#22252c" font-size="20">Menu Bar / Control Center</text><path d="M61 173h378" stroke="#d7d9df"/><text x="61" y="222" fill="#22252c" font-size="20">Battery in menu bar</text><rect x="375" y="198" width="57" height="32" rx="16" fill="#c7cbd2"/><circle cx="391" cy="214" r="13" fill="#fff"/><path d="m179 310 23 23 52-61" fill="none" stroke="#1677ff" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/><text x="250" y="341" text-anchor="middle" fill="#697180" font-size="19">Optional: hide Apple's menu bar battery</text></g>
  </g>
</svg>
